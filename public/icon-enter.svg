<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Paper background (matches theme_color / splash background) -->
  <rect width="512" height="512" fill="#f7f1e4"/>

  <!-- Hand-drawn rounded-square frame — same look as the site's cards and the PNG launch icon -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80"
        fill="none" stroke="#171717" stroke-width="18" stroke-linejoin="round"/>
  <rect x="57" y="57" width="398" height="398" rx="57" ry="57"
        fill="none" stroke="#171717" stroke-width="4" opacity="0.3"/>

  <!--
    Filled Enter / Return glyph (↵): a chunky L-shaped return arrow — riser on the right,
    rounded elbow, horizontal bar left into a big left-pointing arrowhead. Filled in brand
    blue with a bold ink outline. Centred in the 512 canvas from the same normalized
    coordinates as lib/icons/app-icon.ts enterGlyphFilledPath(), so the SVG favicon, the PNG
    launch icons and the in-app splash all show one identical mark.
  -->
  <path
    d="M 344.88 144.90 L 344.88 319.49 L 224.26 319.49 L 224.26 357.58 L 122.68 290.92 L 224.26 224.26 L 224.26 262.35 L 287.74 262.35 L 287.74 144.90 Z"
    fill="#2563eb" stroke="#171717" stroke-width="23" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
