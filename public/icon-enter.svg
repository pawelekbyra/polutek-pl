<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Paper background -->
  <rect width="512" height="512" fill="#f7f1e4"/>

  <!--
    Hand-drawn ENTER button rectangle.
    Each edge is a cubic bezier with slight wobble — same technique as Rough.js.
    Button area: roughly x=86 y=186 w=340 h=140, centered in 512x512.
    Two overlapping strokes per edge for the sketchy double-line effect.
  -->

  <!-- Top edge — stroke 1 -->
  <path d="M 89 193 C 140 190, 220 188, 300 191 C 360 193, 400 191, 423 192"
        fill="none" stroke="#121212" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <!-- Top edge — stroke 2 (slight offset) -->
  <path d="M 87 196 C 160 194, 250 192, 340 195 C 385 196, 410 194, 424 195"
        fill="none" stroke="#121212" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>

  <!-- Right edge — stroke 1 -->
  <path d="M 422 193 C 424 220, 425 270, 423 295 C 422 310, 423 320, 422 327"
        fill="none" stroke="#121212" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <!-- Right edge — stroke 2 -->
  <path d="M 425 196 C 427 235, 426 275, 425 305 C 424 318, 425 325, 424 329"
        fill="none" stroke="#121212" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>

  <!-- Bottom edge — stroke 1 -->
  <path d="M 423 326 C 390 328, 320 330, 230 327 C 160 325, 110 327, 88 326"
        fill="none" stroke="#121212" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <!-- Bottom edge — stroke 2 -->
  <path d="M 425 329 C 370 331, 280 333, 190 330 C 130 328, 100 330, 86 329"
        fill="none" stroke="#121212" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>

  <!-- Left edge — stroke 1 -->
  <path d="M 89 326 C 87 300, 88 260, 87 230 C 86 210, 88 198, 89 193"
        fill="none" stroke="#121212" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <!-- Left edge — stroke 2 -->
  <path d="M 86 329 C 84 295, 85 255, 84 225 C 83 205, 85 196, 86 193"
        fill="none" stroke="#121212" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>

  <!-- ENTER text — Comic Sans / handwritten style -->
  <text
    x="256"
    y="262"
    font-family="'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', 'Bradley Hand', cursive"
    font-size="58"
    font-weight="400"
    fill="#121212"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="10"
  >ENTER</text>
</svg>
