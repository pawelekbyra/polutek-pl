<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Paper background (matches theme_color / splash background) -->
  <rect width="512" height="512" fill="#f7f1e4"/>

  <!-- Hand-drawn rounded-square frame — same look as the site's cards and the PNG launch icon -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80"
        fill="none" stroke="#171717" stroke-width="18" stroke-linejoin="round"/>
  <rect x="57" y="57" width="398" height="398" rx="57" ry="57"
        fill="none" stroke="#171717" stroke-width="4" opacity="0.3"/>

  <!--
    Enter / Return glyph (↵): vertical riser on the right, rounded corner, then a
    horizontal stroke left into a left-pointing arrowhead. Centred in the 512 canvas
    from the same normalized coordinates as lib/icons/app-icon.ts enterGlyphPaths(),
    so the SVG favicon, the PNG launch icons and the in-app splash all show one mark.
  -->
  <g fill="none" stroke="#171717" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 322.56 184.32 L 322.56 276.48 Q 322.56 291.84 307.2 291.84 L 189.44 291.84"/>
    <path d="M 189.44 291.84 L 232.96 256"/>
    <path d="M 189.44 291.84 L 232.96 327.68"/>
  </g>
</svg>
