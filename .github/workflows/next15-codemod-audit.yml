name: Next 15 codemod diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: next15-codemod-output-001
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Capture validation logs
        shell: bash
        run: |
          set +e
          npm run quality:strict-escapes > strict-escapes.log 2>&1
          echo "$?" > strict-escapes.exit
          npm run typecheck > typecheck.log 2>&1
          echo "$?" > typecheck.exit
          npm run build > build.log 2>&1
          echo "$?" > build.exit
          cat strict-escapes.log
          cat typecheck.log
          cat build.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: next15-codemod-diagnostics
          path: |
            strict-escapes.log
            strict-escapes.exit
            typecheck.log
            typecheck.exit
            build.log
            build.exit
          retention-days: 1
