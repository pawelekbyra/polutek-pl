name: Generate security remediation package files

on:
  pull_request:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/dependency-remediation-001
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Generate package files with npm
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm install 'next@^15.5.19' '@clerk/nextjs@^7.5.3' --save
          npm install --save-dev --save-exact eslint-config-next@15.5.16
          set +e
          npm run build
          set -e
          changed="$(git diff --name-only)"
          printf '%s\n' "$changed"
          unexpected="$(printf '%s\n' "$changed" | grep -Ev '^(package.json|package-lock.json|next-env.d.ts)$' || true)"
          test -z "$unexpected"
      - name: Commit generated files to delivery branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/security-remediation-seed.yml
          git add package.json package-lock.json next-env.d.ts
          git commit -m "Update security remediation dependencies"
          git push --force origin HEAD:generated-security-package-files-001
