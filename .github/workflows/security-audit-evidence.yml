name: Security audit evidence (temporary)

on:
  push:
    branches:
      - audit/security-evidence-001
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Capture npm audit JSON
        shell: bash
        run: |
          set +e
          npm audit --json > npm-audit-before.json
          audit_exit=$?
          echo "$audit_exit" > npm-audit-exit-code.txt
          node - <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('npm-audit-before.json', 'utf8');
          const data = JSON.parse(raw);
          const summary = {
            error: data.error ?? null,
            statusCode: data.statusCode ?? null,
            metadata: data.metadata ?? null,
            vulnerabilities: data.vulnerabilities ?? null,
          };
          fs.writeFileSync('npm-audit-summary.json', JSON.stringify(summary, null, 2));
          console.log(JSON.stringify({
            error: summary.error,
            statusCode: summary.statusCode,
            severityCounts: summary.metadata?.vulnerabilities ?? null,
            packages: summary.vulnerabilities ? Object.keys(summary.vulnerabilities) : [],
          }, null, 2));
          NODE
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: npm-audit-evidence
          path: |
            npm-audit-before.json
            npm-audit-summary.json
            npm-audit-exit-code.txt
          if-no-files-found: error
          retention-days: 1
